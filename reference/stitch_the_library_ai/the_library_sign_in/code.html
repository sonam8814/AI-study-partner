<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .ledger-input {
            border: none;
            border-bottom: 1px solid #1c1b1b;
            background: transparent;
            padding: 8px 0;
            border-radius: 0;
            transition: border-color 0.2s ease-in-out;
        }
        .ledger-input:focus {
            outline: none;
            box-shadow: none;
            border-bottom: 2px solid #7b5800; /* Gilt Gold Focus */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-margin-mobile">
<!-- Auth Container -->
<main class="w-full max-w-[440px] animate-fade-in">
<!-- Center Card -->
<div class="bg-elevated-panels border border-aged-paper rounded-[12px] p-8 md:p-12 transition-all">
<!-- Logo Section -->
<div class="text-center mb-10">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">The Library</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-2 tracking-wide uppercase">Private Archive &amp; Reading Room</p>
</div>
<!-- Login Form -->
<form class="space-y-8" onsubmit="return false;">
<!-- Email Field -->
<div class="flex flex-col">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-1" for="email">Email Address</label>
<input class="ledger-input font-body-md text-body-md" id="email" name="email" placeholder="scholar@library.edu" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col">
<div class="flex justify-between items-center mb-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline" href="#">Forgot?</a>
</div>
<input class="ledger-input font-body-md text-body-md" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-forest-green text-white font-label-sm text-label-sm py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Sign in to Archive
                </button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-aged-paper"></div>
</div>
<div class="relative px-4 bg-elevated-panels text-on-surface-variant font-label-sm text-label-sm italic">
                    or
                </div>
</div>
<!-- Social Login -->
<button class="w-full bg-white border border-forest-green text-forest-green font-label-sm text-label-sm py-4 rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<svg fill="none" height="18" viewbox="0 0 18 18" width="18" xmlns="http://www.w3.org/2000/svg">
<path d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"></path>
<path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853"></path>
<path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957275C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"></path>
<path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-secondary font-bold hover:underline" href="#">Sign up</a>
</p>
</div>
</div>
<!-- System Aesthetic Footer -->
<div class="mt-8 flex justify-between items-center px-4">
<div class="flex gap-4">
<a class="font-label-sm text-label-sm text-outline hover:text-ink transition-colors" href="#">Privacy</a>
<a class="font-label-sm text-label-sm text-outline hover:text-ink transition-colors" href="#">Terms</a>
</div>
<div class="flex items-center text-outline gap-1">
<span class="material-symbols-outlined text-[16px]">menu_book</span>
<span class="font-label-sm text-label-sm">Established 1894</span>
</div>
</div>

<div class="fixed top-0 left-0 p-8 hidden md:block pointer-events-none">
<div class="w-24 h-24 border-t border-l border-aged-paper opacity-40"></div>
</div>
<div class="fixed bottom-0 right-0 p-8 hidden md:block pointer-events-none">
<div class="w-24 h-24 border-b border-r border-aged-paper opacity-40"></div>
