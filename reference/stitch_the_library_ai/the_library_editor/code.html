<div class="flex-1 border-x border-b border-aged-paper parchment-texture min-h-[600px] flex flex-col p-8 md:p-12 relative">
<textarea class="flex-1 bg-transparent border-none focus:ring-0 font-editor text-body-lg text-on-surface resize-none leading-relaxed overflow-y-auto" spellcheck="false"># The Pneuma in Chrysippus' Philosophy

The concept of **pneuma** (breath or spirit) serves as the physical foundation for the Stoic understanding of the cosmos. According to Chrysippus, it is a mixture of fire and air that permeates all substance, providing it with structure and vitality.

## The Four Scales of Tension

1. **Hexis (Cohesion):** Found in inanimate objects like stones.
2. **Physis (Growth):** Found in plants.
3. **Psyche (Soul):** Found in animals.
4. **Logos (Reason):** Found in human beings and the divine.</textarea></div></main></body></html>
